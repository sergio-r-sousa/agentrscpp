kind: agent
name: calculator-assistant
llm:
  provider: open_ai
  model: openai/gpt-oss-20b
system: You are a concise assistant that uses tools when helpful.
memory:
  type: sliding_window
  window_size: 8
tools:
  - type: calculator
loop_strategy:
  type: re_act
  max_steps: 4
temperature: 0.1
max_tokens: 512
